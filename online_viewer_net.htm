<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema Financeiro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{font-family:Arial;background:#eef1f5;margin:20px}
h1{text-align:center}
.container{display:flex;gap:20px;flex-wrap:wrap}
.card{background:white;padding:20px;border-radius:12px;box-shadow:0 3px 8px rgba(0,0,0,.15);flex:1;min-width:320px}
input,select{padding:7px;margin:4px;width:95%}
button{padding:8px 12px;border:none;border-radius:6px;background:#2c7be5;color:white;cursor:pointer}
button:hover{background:#1a5fd0}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{border:1px solid #ddd;padding:6px;text-align:center}
th{background:#f2f2f2}
.resumo{display:flex;gap:20px;margin-bottom:20px;flex-wrap:wrap}
.resumo div{background:white;padding:15px;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,.15);min-width:200px}
.valor{font-size:20px;font-weight:bold}
.filtro{margin-bottom:15px}
canvas{background:white;border-radius:10px;padding:10px}
</style>
</head>
<body>

<h1>Dashboard Financeiro</h1>

<div class="filtro">
Filtrar por mês: <input type="month" id="filtroMes" onchange="render()">
<button onclick="exportarCSV()">Exportar para Excel</button>
</div>

<div class="resumo">
<div>
Entradas
<div id="totalEntradas" class="valor">R$ 0</div>
</div>

<div>
Gastos Fixos
<div id="totalFixos" class="valor">R$ 0</div>
</div>

<div>
Gastos Diários
<div id="totalDiarios" class="valor">R$ 0</div>
</div>

<div>
Saldo
<div id="saldo" class="valor">R$ 0</div>
</div>
</div>

<div class="container">

<div class="card">
<h2>Adicionar Gasto Diário</h2>
<input type="date" id="dataGasto">
<input type="text" id="descGasto" placeholder="Descrição">
<select id="catGasto">
<option>Mercado</option>
<option>Combustível</option>
<option>Transporte</option>
<option>Lazer</option>
<option>Outros</option>
</select>
<input type="number" id="valorGasto" placeholder="Valor">
<button onclick="addGasto()">Adicionar</button>

<table>
<thead>
<tr>
<th>Data</th>
<th>Descrição</th>
<th>Categoria</th>
<th>Valor</th>
<th></th>
</tr>
</thead>
<tbody id="listaGastos"></tbody>
</table>
</div>

<div class="card">
<h2>Gastos Fixos Mensais</h2>
<input type="text" id="descFixo" placeholder="Descrição">
<input type="number" id="valorFixo" placeholder="Valor">
<button onclick="addFixo()">Adicionar</button>

<table>
<thead>
<tr>
<th>Descrição</th>
<th>Valor</th>
<th></th>
</tr>
</thead>
<tbody id="listaFixos"></tbody>
</table>
</div>

<div class="card">
<h2>Entradas Fixas</h2>
<input type="text" id="descEntrada" placeholder="Descrição">
<input type="number" id="valorEntrada" placeholder="Valor">
<button onclick="addEntrada()">Adicionar</button>

<table>
<thead>
<tr>
<th>Descrição</th>
<th>Valor</th>
<th></th>
</tr>
</thead>
<tbody id="listaEntradas"></tbody>
</table>
</div>

</div>

<h2>Gráfico de Gastos por Categoria</h2>
<canvas id="grafico"></canvas>

<script>

let gastos = JSON.parse(localStorage.getItem("gastos")) || []
let fixos = JSON.parse(localStorage.getItem("fixos")) || []
let entradas = JSON.parse(localStorage.getItem("entradas")) || []

let grafico

function salvar(){
localStorage.setItem("gastos",JSON.stringify(gastos))
localStorage.setItem("fixos",JSON.stringify(fixos))
localStorage.setItem("entradas",JSON.stringify(entradas))
render()
}

function addGasto(){
let data=document.getElementById("dataGasto").value
let desc=document.getElementById("descGasto").value
let cat=document.getElementById("catGasto").value
let valor=parseFloat(document.getElementById("valorGasto").value)
if(!data||!desc||!valor)return

gastos.push({data,desc,cat,valor})
salvar()
}

function addFixo(){
let desc=document.getElementById("descFixo").value
let valor=parseFloat(document.getElementById("valorFixo").value)
if(!desc||!valor)return

fixos.push({desc,valor})
salvar()
}

function addEntrada(){
let desc=document.getElementById("descEntrada").value
let valor=parseFloat(document.getElementById("valorEntrada").value)
if(!desc||!valor)return

entradas.push({desc,valor})
salvar()
}

function remover(lista,index){
lista.splice(index,1)
salvar()
}

function render(){

let filtro=document.getElementById("filtroMes").value

let listaGastos=document.getElementById("listaGastos")
let listaFixos=document.getElementById("listaFixos")
let listaEntradas=document.getElementById("listaEntradas")

listaGastos.innerHTML=""
listaFixos.innerHTML=""
listaEntradas.innerHTML=""

let totalGastos=0
let totalFixos=0
let totalEntradas=0

let categorias={}


gastos.forEach((g,i)=>{

if(filtro && !g.data.startsWith(filtro)) return


if(!categorias[g.cat]) categorias[g.cat]=0
categorias[g.cat]+=g.valor

totalGastos+=g.valor

listaGastos.innerHTML+=`<tr>
<td>${g.data}</td>
<td>${g.desc}</td>
<td>${g.cat}</td>
<td>R$ ${g.valor}</td>
<td><button onclick="remover(gastos,${i})">X</button></td>
</tr>`
})

fixos.forEach((f,i)=>{
totalFixos+=f.valor
listaFixos.innerHTML+=`<tr>
<td>${f.desc}</td>
<td>R$ ${f.valor}</td>
<td><button onclick="remover(fixos,${i})">X</button></td>
</tr>`
})

entradas.forEach((e,i)=>{
totalEntradas+=e.valor
listaEntradas.innerHTML+=`<tr>
<td>${e.desc}</td>
<td>R$ ${e.valor}</td>
<td><button onclick="remover(entradas,${i})">X</button></td>
</tr>`
})

let saldo=totalEntradas-(totalFixos+totalGastos)


document.getElementById("totalEntradas").innerText="R$ "+totalEntradas.toFixed(2)
document.getElementById("totalFixos").innerText="R$ "+totalFixos.toFixed(2)
document.getElementById("totalDiarios").innerText="R$ "+totalGastos.toFixed(2)
document.getElementById("saldo").innerText="R$ "+saldo.toFixed(2)

atualizarGrafico(categorias)
}

function atualizarGrafico(categorias){

let ctx=document.getElementById("grafico")

let labels=Object.keys(categorias)
let valores=Object.values(categorias)

if(grafico) grafico.destroy()


grafico=new Chart(ctx,{
 type:"pie",
 data:{
 labels:labels,
 datasets:[{
 data:valores
 }]
 }
})

}

function exportarCSV(){
let linhas="Data,Descricao,Categoria,Valor\n"

gastos.forEach(g=>{
linhas+=`${g.data},${g.desc},${g.cat},${g.valor}\n`
})

let blob=new Blob([linhas],{type:"text/csv"})
let link=document.createElement("a")
link.href=URL.createObjectURL(blob)
link.download="financas.csv"
link.click()
}

render()

</script>

</body>
</html>
